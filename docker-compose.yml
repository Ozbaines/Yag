services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  content_engine:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    command: python -m content_engine.main
    volumes:
      - ./storage:/app/storage

  tg_admin_bot:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    command: python -m tg_admin_bot.main
    volumes:
      - ./storage:/app/storage

  tg_subscriber_bot:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    command: python -m tg_subscriber_bot.main
    volumes:
      - ./storage:/app/storage

  publisher:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    command: python -m publisher.main
    volumes:
      - ./storage:/app/storage

  video_factory:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    command: python -m video_factory.main
    volumes:
      - ./storage:/app/storage

  payments:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    command: uvicorn payments.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - payments

volumes:
  pg_data:
  redis_data:
